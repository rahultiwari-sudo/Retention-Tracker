<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>SellerGeni — Retention Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface2: #f9f9f9;
    --surface3: #f3f3f3;
    --border: #e5e5e5;
    --border2: #d0d0d0;
    --accent: #111111;
    --accent2: #333333;
    --accent-glow: rgba(0,0,0,0.04);
    --green: #16a34a;
    --green-dim: rgba(22,163,74,0.08);
    --amber: #d97706;
    --amber-dim: rgba(217,119,6,0.08);
    --red: #dc2626;
    --red-dim: rgba(220,38,38,0.07);
    --blue: #2563eb;
    --blue-dim: rgba(37,99,235,0.08);
    --purple: #7c3aed;
    --purple-dim: rgba(124,58,237,0.08);
    --text: #111111;
    --text2: #555555;
    --text3: #999999;
    --radius: 8px;
    --radius-sm: 5px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }
  
  /* LOGIN */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fafafa; }
  .login-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 48px; width: 400px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .login-logo { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
  .login-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .login-sub { color: var(--text3); font-size: 13px; margin-bottom: 32px; }
  .role-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 24px; }
  .role-btn { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 8px; text-align: center; cursor: pointer; transition: all 0.12s; }
  .role-btn:hover { border-color: var(--accent); background: var(--surface2); }
  .role-btn.active { border-color: var(--accent); background: var(--surface2); }
  .role-btn .role-icon { font-size: 20px; margin-bottom: 6px; }
  .role-btn .role-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
  .login-input { width: 100%; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; color: var(--text); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; margin-bottom: 10px; }
  .login-input:focus { border-color: var(--accent); }
  .login-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 11px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .login-btn:hover { opacity: 0.85; }
  .login-err { color: var(--red); font-size: 12px; margin-top: 8px; text-align: center; }
  select.login-input { appearance: none; }

  /* LAYOUT */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 210px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-logo { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-logo .brand { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; color: var(--text3); text-transform: uppercase; }
  .sidebar-logo .product { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 2px; }
  .sidebar-logo .role-badge { display: inline-block; margin-top: 6px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; }
  .role-am { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
  .role-sales { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  .role-admin { background: #faf5ff; color: #6b21a8; border: 1px solid #e9d5ff; }
  .sidebar-nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text3); font-size: 12.5px; font-weight: 500; transition: all 0.1s; margin-bottom: 1px; }
  .nav-item:hover { background: var(--surface2); color: var(--text2); }
  .nav-item.active { background: var(--surface2); color: var(--text); font-weight: 600; border-left: 2px solid var(--accent); border-radius: 0; padding-left: 8px; }
  .nav-item .nav-icon { width: 16px; text-align: center; font-size: 13px; }
  .nav-section { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #ccc; padding: 14px 10px 6px; }
  .sidebar-footer { padding: 12px 14px; border-top: 1px solid var(--border); }
  .user-info { display: flex; align-items: center; gap: 9px; }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text2); flex-shrink: 0; }
  .user-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .user-role { font-size: 10px; color: var(--text3); }
  .logout-btn { margin-left: auto; background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 4px; }
  .logout-btn:hover { color: var(--red); }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { height: 48px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; flex-shrink: 0; }
  .page-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .topbar-spacer { flex: 1; }




  /* TABLE */
  .content { flex: 1; overflow-y: auto; padding: 16px 20px; background: #fafafa; }
  .table-wrap { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.1s; font-family: 'Inter', sans-serif; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost { background: #fff; border: 1px solid var(--border); color: var(--text2); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: #fafafa; padding: 8px 12px; text-align: left; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); border-bottom: 1px solid var(--border); vertical-align: top; }
  thead th:hover { background: #f3f3f3; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.08s; cursor: pointer; }
  tbody tr:hover { background: #fafafa; }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 9px 12px; font-size: 12.5px; color: var(--text2); white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
  td.name-cell { color: var(--text); font-weight: 500; }
  td.name-cell:hover { color: var(--blue); }
  .table-wrap.auto-fit table { table-layout: auto; }
  .table-wrap.auto-fit td { white-space: normal; max-width: none; overflow: visible; text-overflow: clip; word-break: break-word; }

  /* BADGES — outlined style for chalk */
  .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 3px; font-size: 10.5px; font-weight: 600; white-space: nowrap; border: 1px solid; }
  .badge-platinum { border-color: #94a3b8; color: #334155; background: #f1f5f9; }
  .badge-gold { border-color: #fbbf24; color: #92400e; background: #fffbeb; }
  .badge-silver { border-color: #cbd5e1; color: #475569; background: #f8fafc; }
  .badge-bronze { border-color: #fb923c; color: #9a3412; background: #fff7ed; }
  .badge-green { border-color: #86efac; color: #166534; background: #f0fdf4; }
  .badge-lightgreen { border-color: #d9f99d; color: #4d7c0f; background: #f7fee7; }
  .badge-amber { border-color: #fcd34d; color: #b45309; background: #fffbeb; }
  .badge-yellow { border-color: #fde047; color: #854d0e; background: #fefce8; }
  .badge-orange { border-color: #fdba74; color: #c2410c; background: #fff7ed; }
  .badge-red { border-color: #fca5a5; color: #dc2626; background: #fef2f2; }
  .badge-blue { border-color: #93c5fd; color: #1d4ed8; background: #eff6ff; }
  .badge-purple { border-color: #d8b4fe; color: #6b21a8; background: #faf5ff; }
  .badge-gray { border-color: var(--border); color: var(--text3); background: var(--surface2); }
  .badge-hot { border-color: #fca5a5; color: #dc2626; background: #fef2f2; }
  .badge-warm { border-color: #fcd34d; color: #b45309; background: #fffbeb; }
  .badge-cold { border-color: #bae6fd; color: #0369a1; background: #f0f9ff; }

  /* SIDE PANEL */
  .panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 100; display: flex; justify-content: flex-end; }
  .panel { width: 560px; background: #fff; border-left: 1px solid var(--border); height: 100%; display: flex; flex-direction: column; animation: slideIn 0.18s ease; box-shadow: -4px 0 24px rgba(0,0,0,0.08); }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .panel-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; }
  .panel-store { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .panel-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .panel-close { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text3); font-size: 14px; flex-shrink: 0; }
  .panel-close:hover { color: var(--text); border-color: var(--border2); }
  .panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; padding: 0 20px; }
  .panel-tab { padding: 9px 12px; font-size: 12px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.1s; white-space: nowrap; }
  .panel-tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .panel-body { flex: 1; overflow-y: auto; padding: 20px; background: #fafafa; }

  /* FORMS */
  .form-section { margin-bottom: 20px; }
  .form-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text3); }
  .form-control { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; color: var(--text); font-size: 12.5px; font-family: 'Inter', sans-serif; outline: none; width: 100%; transition: border-color 0.1s; }
  .form-control:focus { border-color: var(--accent); }
  .form-control:disabled { opacity: 0.5; cursor: not-allowed; background: var(--surface2); }
  select.form-control { cursor: pointer; }
  .auto-badge { font-size: 10px; color: var(--text3); font-weight: 500; }

  /* METRICS GRID */
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .metric-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
  .metric-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 4px; }
  .metric-value { font-size: 16px; font-weight: 600; color: var(--text); font-family: 'JetBrains Mono', monospace; }

  /* TIMELINE */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-dot { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; margin-top: 2px; border: 1px solid var(--border); }
  .timeline-content { flex: 1; }
  .timeline-author { font-size: 12px; font-weight: 600; color: var(--text); }
  .timeline-role { font-size: 10.5px; color: var(--text3); margin-left: 6px; }
  .timeline-time { font-size: 10.5px; color: var(--text3); float: right; }
  .timeline-msg { font-size: 12.5px; color: var(--text2); margin-top: 4px; line-height: 1.5; }

  /* REMARKS */
  .remarks-input { width: 100%; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-size: 12.5px; font-family: 'Inter', sans-serif; outline: none; resize: vertical; min-height: 80px; transition: border-color 0.1s; }
  .remarks-input:focus { border-color: var(--accent); }
  .remarks-post-row { display: flex; justify-content: flex-end; margin-top: 8px; }

  /* DASHBOARD */
  .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .pipeline-grid { grid-template-columns: 1fr 1fr; }
  .am-cards-grid { grid-template-columns: repeat(3, 1fr); }
  .dash-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
  .dash-card-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 8px; }
  .dash-card-value { font-size: 26px; font-weight: 600; color: var(--text); font-family: 'JetBrains Mono', monospace; line-height: 1; }
  .dash-card-sub { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .dash-card-accent { border-left: 2px solid var(--accent); }
  .dash-card-green { border-left: 2px solid var(--green); }
  .dash-card-amber { border-left: 2px solid var(--amber); }
  .dash-card-red { border-left: 2px solid var(--red); }
  .dash-card-purple { border-left: 2px solid var(--purple); }
  .section-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-title .dot { width: 5px; height: 5px; border-radius: 50%; }
  .funnel-wrap { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
  .funnel-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .funnel-label { font-size: 11.5px; color: var(--text2); width: 140px; text-align: right; flex-shrink: 0; }
  .funnel-bar-wrap { flex: 1; background: var(--surface2); border-radius: 3px; height: 20px; overflow: hidden; }
  .funnel-bar { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: 8px; transition: width 0.5s ease; }
  .funnel-val { font-size: 11px; font-weight: 600; color: #fff; font-family: 'JetBrains Mono', monospace; }
  .am-perf-wrap { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
  /* Dashboard reports should fit their columns instead of stretching across the page. */
  .dashboard-content .am-perf-wrap { width: fit-content; max-width: 100%; }
  .dashboard-content .am-perf-wrap table { width: auto; }
  .am-perf-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .tab-pills { display: flex; gap: 4px; }
  .tab-pill { padding: 4px 10px; border-radius: 3px; font-size: 11px; font-weight: 600; cursor: pointer; background: var(--surface2); border: 1px solid var(--border); color: var(--text3); transition: all 0.1s; }
  .tab-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .leaderboard { padding: 0; }
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid var(--border); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-size: 13px; font-weight: 700; color: var(--text3); font-family: 'JetBrains Mono', monospace; width: 24px; text-align: center; flex-shrink: 0; }
  .lb-rank.gold { color: #d97706; }
  .lb-rank.silver { color: #64748b; }
  .lb-rank.bronze { color: #92400e; }
  .lb-name { flex: 1; font-size: 12.5px; font-weight: 600; color: var(--text); }
  .lb-team { font-size: 11px; color: var(--text3); }
  .lb-stats { display: flex; gap: 16px; }
  .lb-stat { text-align: right; }
  .lb-stat-val { font-size: 13px; font-weight: 700; color: var(--text); font-family: 'JetBrains Mono', monospace; }
  .lb-stat-label { font-size: 10px; color: var(--text3); }
  .bar-chart-wrap { padding: 14px 16px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-name { font-size: 11.5px; color: var(--text2); width: 100px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
  .am-perf-wrap.auto-fit .bar-name { width: auto; max-width: 220px; overflow: visible; text-overflow: clip; white-space: normal; word-break: break-word; }
  .bar-outer { flex: 1; background: var(--surface2); border-radius: 3px; height: 18px; overflow: hidden; }
  .bar-inner { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: 8px; min-width: 20px; }
  .bar-val { font-size: 11px; font-weight: 600; color: #fff; font-family: 'JetBrains Mono', monospace; }

  /* UPLOAD */
  .upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 40px; text-align: center; cursor: pointer; transition: all 0.12s; background: #fff; }
  .upload-zone:hover { border-color: var(--accent); background: #fafafa; }
  .upload-zone.drag { border-color: var(--accent); background: #fafafa; }
  .upload-icon { font-size: 28px; margin-bottom: 12px; }
  .upload-text { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .upload-sub { font-size: 12px; color: var(--text3); }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .empty-sub { font-size: 12px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #bbb; }

  /* SYNC BAR */
  .sync-bar { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: var(--radius-sm); padding: 7px 12px; font-size: 11.5px; color: var(--green); display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .sync-bar.error { background: #fef2f2; border-color: #fecaca; color: var(--red); }
  .sync-bar.warn { background: #fffbeb; border-color: #fde68a; color: var(--amber); }

  /* CONFIG */
  .config-wrap { max-width: 560px; }
  .config-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 14px; }
  .config-card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .config-card-sub { font-size: 11.5px; color: var(--text3); margin-bottom: 16px; }
  .input-label { font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 5px; display: block; }

  /* TOOLTIP */
  .info-tip { display: inline-block; width: 14px; height: 14px; border-radius: 50%; background: var(--surface2); color: var(--text3); font-size: 9px; text-align: center; line-height: 14px; cursor: help; margin-left: 4px; border: 1px solid var(--border); }

  /* CALENDAR */
  .cal-wrap { display:flex; flex-direction:column; height:100%; overflow:hidden; }
  .cal-toolbar { display:flex; align-items:center; gap:10px; padding:12px 20px; border-bottom:1px solid var(--border); background:#fff; flex-shrink:0; flex-wrap:wrap; }
  .cal-nav-group { display:flex; align-items:center; gap:6px; }
  .cal-nav-btn { background:#fff; border:1px solid var(--border); border-radius:var(--radius-sm); width:26px; height:26px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text3); font-size:13px; transition:all 0.1s; }
  .cal-nav-btn:hover { border-color:var(--accent); color:var(--accent); }
  .cal-title { font-size:13px; font-weight:600; color:var(--text); min-width:180px; text-align:center; }
